<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图片背景移除</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eee 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #333; margin-bottom: 10px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #667eee;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 48px; margin-bottom: 10px; }
    .btn {
      background: linear-gradient(135deg, #667eee 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .preview { margin-top: 20px; display: none; }
    .preview img { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .loading { display: none; text-align: center; margin-top: 20px; }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eee;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error { color: #e74c3c; text-align: center; margin-top: 15px; display: none; }
    .download-btn {
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🪄 AI 图片背景移除</h1>
    <p class="subtitle">使用 Remove.bg 智能移除图片背景</p>
    
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*">
      <div class="upload-icon">📤</div>
      <p>点击或拖拽图片到这里</p>
      <p style="color:#999;font-size:14px;margin-top:5px;">支持 JPG, PNG, WebP</p>
    </div>
    
    <button class="btn" id="removeBtn" disabled>移除背景</button>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>AI 正在处理中...</p>
    </div>
    
    <div class="error" id="error"></div>
    
    <div class="preview" id="preview">
      <h3 style="text-align:center;margin-bottom:10px;">✅ 处理完成！</h3>
      <img id="resultImg" alt="Result">
      <a class="btn download-btn" id="downloadBtn" download="removed-bg.png">下载图片</a>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const removeBtn = document.getElementById('removeBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const preview = document.getElementById('preview');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;
    let processedBlob = null;

    uploadArea.addEventListener('click', () => fileInput.click());
    
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.background = '#f8f9ff';
    });
    
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.background = '';
    });
    
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.background = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        handleFile(file);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      selectedFile = file;
      removeBtn.disabled = false;
      preview.style.display = 'none';
      error.style.display = 'none';
      
      // Show preview of original
      const reader = new FileReader();
      reader.onload = (e) => {
        preview.style.display = 'block';
        resultImg.src = e.target.result;
        downloadBtn.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      
      removeBtn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';
      
      try {
        // Call our Cloudflare Worker
        const formData = new FormData();
        formData.append('image_file', selectedFile);
        
        // Determine Worker URL based on environment
        const workerUrl = window.location.origin.includes('pages.dev') 
          ? window.location.origin.replace('.pages.dev', '.workers.dev') + '/remove-bg'
          : '/remove-bg';
        
        const response = await fetch(workerUrl, {
          method: 'POST',
          body: formData,
        });
        
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `HTTP ${response.status}`);
        }
        
        processedBlob = await response.blob();
        const url = URL.createObjectURL(processedBlob);
        resultImg.src = url;
        downloadBtn.href = url;
        downloadBtn.style.display = 'block';
        preview.style.display = 'block';
        
      } catch (err) {
        error.textContent = '处理失败: ' + err.message;
        error.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        removeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
