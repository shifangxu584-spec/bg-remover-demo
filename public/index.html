<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 图片背景移除</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eee 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .header h1 { margin: 0; font-size: 24px; }
    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-info img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }
    .user-info span { font-size: 14px; color: #666; }
    .btn-login {
      background: #4285f4;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-login:hover { background: #357ae8; }
    .btn-logout {
      background: #f1f1f1;
      color: #666;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-logout:hover { background: #e0e0e0; }
    .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
    .upload-area {
      border: 3px dashed #667eee;
      border-radius: 15px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { background: #f8f9ff; border-color: #764ba2; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 48px; margin-bottom: 10px; }
    .btn {
      background: linear-gradient(135deg, #667eee 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .preview { margin-top: 20px; display: none; }
    .preview img { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .loading { display: none; text-align: center; margin-top: 20px; }
    .spinner {
      width: 50px; height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eee;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .error { color: #e74c3c; text-align: center; margin-top: 15px; display: none; }
    .download-btn {
      background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
      color: white;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 15px;
      padding: 15px;
      border-radius: 30px;
    }
    .login-gate {
      text-align: center;
      padding: 40px 20px;
      background: #f8f9ff;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .login-gate p { color: #666; margin-bottom: 15px; }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🪄 AI 图片背景移除</h1>
      <div id="authSection">
        <!-- JS will populate -->
      </div>
    </div>

    <div id="loginGate" class="login-gate" style="display:none;">
      <p>🔐 请先登录后再使用</p>
      <a href="/auth/google" class="btn-login" id="loginBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18" alt="G">
        使用 Google 登录
      </a>
    </div>

    <p class="subtitle">使用 Remove.bg 智能移除图片背景</p>

    <div id="mainContent">
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*">
        <div class="upload-icon">📤</div>
        <p>点击或拖拽图片到这里</p>
        <p style="color:#999;font-size:14px;margin-top:5px;">支持 JPG, PNG, WebP</p>
      </div>

      <button class="btn" id="removeBtn" disabled>移除背景</button>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>AI 正在处理中...</p>
      </div>

      <div class="error" id="error"></div>

      <div class="preview" id="preview">
        <h3 style="text-align:center;margin-bottom:10px;">✅ 处理完成！</h3>
        <img id="resultImg" alt="Result">
        <a class="btn download-btn" id="downloadBtn" download="removed-bg.png">下载图片</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const authSection = document.getElementById('authSection');
    const loginGate = document.getElementById('loginGate');
    const mainContent = document.getElementById('mainContent');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const removeBtn = document.getElementById('removeBtn');
    const loading = document.getElementById('loading');
    const error = document.getElementById('error');
    const preview = document.getElementById('preview');
    const resultImg = document.getElementById('resultImg');
    const downloadBtn = document.getElementById('downloadBtn');
    const toast = document.getElementById('toast');

    let currentUser = null;
    let selectedFile = null;
    let processedBlob = null;

    // ---------- Auth init ----------
    function initAuth() {
      const stored = localStorage.getItem('user');
      const token = localStorage.getItem('session_token');
      if (stored && token) {
        currentUser = JSON.parse(stored);
      }
      renderAuthUI();
      checkUrlParams();
    }

    function renderAuthUI() {
      if (currentUser) {
        authSection.innerHTML = `
          <div class="user-info">
            <img src="${currentUser.picture || 'https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg'}" alt="avatar">
            <span>${currentUser.name || currentUser.email}</span>
          </div>
          <button class="btn-logout" onclick="logout()">退出</button>
        `;
        loginGate.style.display = 'none';
        mainContent.style.display = 'block';
      } else {
        authSection.innerHTML = `
          <a href="/auth/google" class="btn-login">🔵 登录</a>
        `;
        loginGate.style.display = 'block';
        mainContent.style.display = 'none';
      }
    }

    function logout() {
      localStorage.removeItem('session_token');
      localStorage.removeItem('user');
      currentUser = null;
      renderAuthUI();
      showToast('已退出登录');
      window.location.href = '/auth/logout';
    }

    function checkUrlParams() {
      const params = new URLSearchParams(window.location.search);
      if (params.has('logged_in')) {
        const user = localStorage.getItem('user');
        if (user) {
          currentUser = JSON.parse(user);
          renderAuthUI();
          showToast('✅ 登录成功');
        }
        // Clean URL
        history.replaceState({}, '', window.location.pathname);
      }
      if (params.has('logged_out')) {
        history.replaceState({}, '', window.location.pathname);
      }
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getToken() {
      return localStorage.getItem('session_token');
    }

    // ---------- Upload logic ----------
    uploadArea.addEventListener('click', () => fileInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.background = '#f8f9ff';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.background = '';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.background = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      if (!currentUser) {
        showToast('请先登录');
        return;
      }
      selectedFile = file;
      removeBtn.disabled = false;
      preview.style.display = 'none';
      error.style.display = 'none';

      const reader = new FileReader();
      reader.onload = (e) => {
        preview.style.display = 'block';
        resultImg.src = e.target.result;
        downloadBtn.style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    removeBtn.addEventListener('click', async () => {
      if (!selectedFile || !currentUser) return;

      removeBtn.disabled = true;
      loading.style.display = 'block';
      error.style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('image_file', selectedFile);

        const token = getToken();
        const headers = { 'Authorization': `Bearer ${token}` };

        const workerUrl = window.location.origin.includes('pages.dev')
          ? window.location.origin.replace('.pages.dev', '.workers.dev') + '/remove-bg'
          : '/remove-bg';

        const response = await fetch(workerUrl, {
          method: 'POST',
          headers,
          body: formData,
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `HTTP ${response.status}`);
        }

        processedBlob = await response.blob();
        const url = URL.createObjectURL(processedBlob);
        resultImg.src = url;
        downloadBtn.href = url;
        downloadBtn.style.display = 'block';
        preview.style.display = 'block';

      } catch (err) {
        error.textContent = '处理失败: ' + err.message;
        error.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        removeBtn.disabled = false;
      }
    });

    // Init
    initAuth();
  </script>
</body>
</html>
