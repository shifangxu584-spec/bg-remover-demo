name: Deploy to Cloudflare

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CF_PROJECT_NAME: 'bg-remover-demo'
  WORKER_NAME: 'bg-remover-worker'
  D1_DB_NAME: 'bg-remover-db'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Wrangler
      run: npm install -g wrangler@3

    - name: Get or Create D1 Database
      id: d1
      run: |
        set -o pipefail

        echo "=== Checking existing D1 databases ==="
        LIST_OUTPUT=$(wrangler d1 list 2>&1)
        echo "List output: $LIST_OUTPUT"

        # Try to find existing DB by name
        EXISTING_ID=$(echo "$LIST_OUTPUT" | python3 -c "
import sys, json
lines = sys.stdin.read().strip().split('\n')
for line in lines:
    try:
        d = json.loads(line)
        if d.get('name') == '${{ env.D1_DB_NAME }}':
            print(d.get('uuid', ''))
            break
    except:
        pass
" 2>/dev/null || echo "")

        if [ -n "$EXISTING_ID" ]; then
          echo "✅ Found existing D1 database: $EXISTING_ID"
          echo "DB_ID=$EXISTING_ID" >> $GITHUB_OUTPUT
        else
          echo "🔨 Creating new D1 database..."
          CREATE_OUTPUT=$(wrangler d1 create ${{ env.D1_DB_NAME }} 2>&1)
          echo "Create output: $CREATE_OUTPUT"
          DB_ID=$(echo "$CREATE_OUTPUT" | python3 -c "
import sys, json
for line in sys.stdin:
    line = line.strip()
    if not line:
        continue
    try:
        d = json.loads(line)
        if 'uuid' in d:
            print(d['uuid'])
            break
    except:
        pass
" 2>/dev/null || echo "")

          if [ -z "$DB_ID" ]; then
            echo "⚠️ Could not create/find D1 DB, using secret fallback."
            DB_ID="${{ secrets.D1_DATABASE_ID }}"
          fi
          echo "DB_ID=$DB_ID" >> $GITHUB_OUTPUT
        fi

        echo "Final DB_ID: $DB_ID"
        if [ -z "$DB_ID" ]; then
          echo "ERROR: DB_ID is empty!"
          exit 1
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Apply D1 Schema
      run: |
        # Substitute DB ID in wrangler.toml
        sed -i "s/YOUR_D1_DATABASE_ID/${{ steps.d1.outputs.DB_ID }}/" wrangler.toml
        echo "wrangler.toml after substitution:"
        grep -A2 d1 wrangler.toml

        # Apply schema to D1
        wrangler d1 execute ${{ env.D1_DB_NAME }} \
          --file=worker/schema.sql \
          --remote \
          --yes \
          --batch-size=100
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy Worker
      run: |
        cd worker
        wrangler deploy --name=${{ env.WORKER_NAME }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    - name: Deploy to Cloudflare Pages
      run: |
        wrangler pages deploy public \
          --project-name=${{ env.CF_PROJECT_NAME }} \
          --branch=master
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Output deployment URL
      run: |
        echo "🚀 部署完成!"
        echo "📱 网站: https://${{ env.CF_PROJECT_NAME }}.pages.dev"
        echo "🔧 Worker: https://${{ env.WORKER_NAME }}.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
        echo "🗄️  D1 DB ID: ${{ steps.d1.outputs.DB_ID }}"
