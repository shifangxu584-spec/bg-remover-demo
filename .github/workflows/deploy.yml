name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  CF_PROJECT_NAME: 'bg-remover-demo'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Install dependencies
      run: |
        npm ci
        echo "Dependencies installed"
        
    - name: Deploy to Cloudflare Pages
      id: deploy
      uses: cloudflare/wrangler-action@v3
      with:
        apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        command: pages deploy . --project-name=${{ env.CF_PROJECT_NAME }} --branch=master
      env:
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        NODE_ENV: production
        PORT: '3000'
        
    - name: Output deployment URL
      run: |
        echo "Deployment completed!"
        echo "If successful, your site will be available at:"
        echo "https://${{ env.CF_PROJECT_NAME }}.pages.dev"