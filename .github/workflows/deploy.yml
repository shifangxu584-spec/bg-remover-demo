name: Deploy to Cloudflare

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CF_PROJECT_NAME: 'bg-remover-demo'
  WORKER_NAME: 'bg-remover-worker'
  D1_DB_NAME: 'bg-remover-db'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Wrangler
      run: npm install -g wrangler@3

    - name: Apply D1 Schema
      run: |
        # Update wrangler.toml with D1 DB ID
        sed -i "s/YOUR_D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/" wrangler.toml
        echo "wrangler.toml:"
        cat wrangler.toml

        # Apply schema (use existing DB)
        wrangler d1 execute ${{ env.D1_DB_NAME }} \
          --file=worker/schema.sql \
          --remote \
          --yes \
          --batch-size=100
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy Worker
      run: |
        cd worker
        wrangler deploy --name=${{ env.WORKER_NAME }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    - name: Deploy to Cloudflare Pages
      run: |
        wrangler pages deploy public \
          --project-name=${{ env.CF_PROJECT_NAME }} \
          --branch=master
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Output deployment URL
      run: |
        echo "🚀 部署完成!"
        echo "📱 网站: https://${{ env.CF_PROJECT_NAME }}.pages.dev"
        echo "🔧 Worker: https://${{ env.WORKER_NAME }}.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
