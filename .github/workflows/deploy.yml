name: Deploy to Cloudflare

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CF_PROJECT_NAME: 'bg-remover-demo'
  WORKER_NAME: 'bg-remover-worker'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install Wrangler
      run: npm install -g wrangler@3
        
    - name: Deploy Worker
      run: |
        cd worker
        wrangler deploy --name=${{ env.WORKER_NAME }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}

    - name: Deploy to Cloudflare Pages
      run: |
        wrangler pages deploy public \
          --project-name=${{ env.CF_PROJECT_NAME }} \
          --branch=master
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Output deployment URL
      run: |
        echo "🚀 部署完成!"
        echo "📱 网站: https://${{ env.CF_PROJECT_NAME }}.pages.dev"
        echo "🔧 Worker: https://${{ env.WORKER_NAME }}.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
