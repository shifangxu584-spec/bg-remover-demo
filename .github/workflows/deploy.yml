name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CF_PROJECT_NAME: 'bg-remover-demo'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm cache clean --force
        npm ci --no-audit --prefer-offline
        echo "✅ Dependencies installed successfully"
        
    - name: Install Wrangler globally
      run: |
        npm install -g wrangler@3
        echo "✅ Wrangler installed globally"
        
    - name: Verify Wrangler installation
      run: |
        wrangler --version
        echo "✅ Wrangler is available"
        
    - name: Deploy to Cloudflare Pages
      id: deploy
      run: |
        wrangler pages deploy . \
          --project-name=${{ env.CF_PROJECT_NAME }} \
          --branch=master \
          --commit-hash="${{ github.sha }}"
      env:
        # 使用现有的 Secrets 名称（有 CLOUDFLARE_ 前缀）
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        NODE_ENV: production
        
    - name: Output deployment URL
      run: |
        echo "🚀 Deployment completed!"
        echo "📱 Your site will be available at:"
        echo "👉 https://${{ env.CF_PROJECT_NAME }}.pages.dev"
