name: Deploy to Cloudflare

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  CF_PROJECT_NAME: 'bg-remover-demo'
  WORKER_NAME: 'bg-remover-worker'
  D1_DB_NAME: 'bg-remover-db'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Wrangler
      run: npm install -g wrangler@3

    - name: Get or Create D1 Database
      id: d1
      run: |
        # First try to get existing DB
        echo "Checking for existing D1 database..."
        EXISTING_ID=$(wrangler d1 list --json 2>/dev/null | \
          python3 -c "import sys,json; d=json.load(sys.stdin); [print(x['uuid']) for x in d if x['name']=='${{ env.D1_DB_NAME }}']" 2>/dev/null || echo "")

        if [ -n "$EXISTING_ID" ]; then
          echo "Found existing D1 database: $EXISTING_ID"
          echo "DB_ID=$EXISTING_ID" >> $GITHUB_OUTPUT
        else
          echo "Creating new D1 database..."
          CREATE_OUTPUT=$(wrangler d1 create ${{ env.D1_DB_NAME }} 2>&1)
          echo "Create output: $CREATE_OUTPUT"
          DB_ID=$(echo "$CREATE_OUTPUT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uuid',''))" 2>/dev/null || echo "")
          if [ -z "$DB_ID" ]; then
            echo "WARNING: Could not create/find D1 DB. Will use secret fallback."
            DB_ID="${{ secrets.D1_DATABASE_ID }}"
          fi
          echo "DB_ID=$DB_ID" >> $GITHUB_OUTPUT
        fi

        echo "Final DB_ID: $DB_ID"
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Apply D1 Schema
      run: |
        # Substitute DB ID in wrangler.toml
        sed -i "s/YOUR_D1_DATABASE_ID/${{ steps.d1.outputs.DB_ID }}/" wrangler.toml
        echo "wrangler.toml after substitution:"
        cat wrangler.toml

        # Apply schema to D1
        wrangler d1 execute ${{ env.D1_DB_NAME }} \
          --file=worker/schema.sql \
          --remote \
          --yes \
          --batch-size=100
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Deploy Worker
      run: |
        cd worker
        wrangler deploy --name=${{ env.WORKER_NAME }}
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        REMOVE_BG_API_KEY: ${{ secrets.REMOVE_BG_API_KEY }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

    - name: Deploy to Cloudflare Pages
      run: |
        wrangler pages deploy public \
          --project-name=${{ env.CF_PROJECT_NAME }} \
          --branch=master
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    - name: Output deployment URL
      run: |
        echo "🚀 部署完成!"
        echo "📱 网站: https://${{ env.CF_PROJECT_NAME }}.pages.dev"
        echo "🔧 Worker: https://${{ env.WORKER_NAME }}.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev"
        echo "🗄️  D1 DB ID: ${{ steps.d1.outputs.DB_ID }}"
